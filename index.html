<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miami City RP - FBI MDT Avanzado</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #030712;
            color: #f3f4f6;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Formulario Login */
        .form-container {
            background: #0b1329;
            border: 1px solid #1e3a8a;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            margin: auto;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .form-container h2 {
            color: #38bdf8;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        /* Contenedor Principal MDT */
        .mdt-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Topbar */
        .mdt-topbar {
            background-color: #060b18;
            border-bottom: 1px solid #1e293b;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .badge-icon { font-size: 20px; }
        .server-title { font-weight: 800; color: #fff; font-size: 14px; letter-spacing: 1px; }
        .divider { color: #334155; }
        .dept-title { color: #94a3b8; font-size: 12px; font-weight: 600; }

        /* Botón de Servicio */
        .btn-duty {
            padding: 6px 15px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .duty-on { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: rgba(16, 185, 129, 0.3); }
        .duty-off { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }

        /* Perfil de Usuario */
        .user-profile-wrapper { position: relative; }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: #0f172a;
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid #1e293b;
        }
        .status-indicator { width: 8px; height: 8px; border-radius: 50%; }
        .status-indicator.online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .username { font-size: 12px; font-weight: 600; color: #e2e8f0; }
        .rank-tag { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 3px; border: 1px solid; }

        /* Dropdown Cerrar Sesión */
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 35px;
            background-color: #0b111e;
            min-width: 140px;
            border: 1px solid #1e293b;
            border-radius: 4px;
            z-index: 10;
        }
        .btn-logout {
            width: 100%;
            background: none;
            border: none;
            color: #ef4444;
            padding: 10px;
            text-align: left;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-logout:hover { background: rgba(239, 68, 68, 0.1); }

        /* Estructura Main */
        .mdt-main { display: flex; flex: 1; height: calc(100vh - 60px); }

        /* Sidebar Navigation */
        .mdt-sidebar { width: 240px; background-color: #040814; border-right: 1px solid #1e293b; padding: 15px 10px; }
        .sidebar-header { font-size: 10px; font-weight: 800; color: #4b5563; padding-left: 10px; margin-bottom: 10px; letter-spacing: 1px; }
        .menu-item {
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            margin-bottom: 5px;
            transition: all 0.2s;
        }
        .menu-item:hover { background: #0f172a; color: #fff; }
        .menu-item.active { background: #1e3a8a; color: #38bdf8; border-left: 3px solid #38bdf8; }

        /* Content Area */
        .mdt-content { flex: 1; background: #020613; padding: 25px; overflow-y: auto; }
        .content-header { margin-bottom: 25px; }
        .content-header h1 { font-size: 24px; font-weight: 700; color: #fff; }
        .content-header p { font-size: 13px; color: #6b7280; margin-top: 4px; }

        /* Cards Generales */
        .card { background: #070c19; border: 1px solid #1e293b; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .card-full { width: 100%; }
        .card h3 { font-size: 14px; font-weight: 700; color: #94a3b8; letter-spacing: 0.5px; }
        .card-hr { border: 0; border-top: 1px solid #1e293b; margin: 12px 0; }
        .avatar-placeholder { width: 60px; height: 60px; background: #0f172a; border: 1px solid #1e293b; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        /* Form Inputs Comunes */
        .mdt-input, .mdt-select, .mdt-textarea {
            width: 100%;
            background: #040814;
            border: 1px solid #1e293b;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            margin-top: 5px;
        }
        .mdt-input:focus, .mdt-select:focus, .mdt-textarea:focus { border-color: #38bdf8; }
        .input-label { font-size: 10px; font-weight: 800; color: #4b5563; letter-spacing: 0.5px; }

        /* Tablas */
        .table-ciudadanos { width: 100%; border-collapse: collapse; text-align: left; }
        .table-ciudadanos th { font-size: 11px; color: #4b5563; font-weight: 800; padding: 10px; border-bottom: 1px solid #1e293b; }
        .table-ciudadanos td { padding: 12px 10px; font-size: 13px; border-bottom: 1px solid #0f172a; }
        
        /* Grid de Permisos Administrativos */
        .permissions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-top: 10px; }
        .perm-checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #e2e8f0; cursor: pointer; background: #040814; padding: 8px; border: 1px solid #1e293b; border-radius: 4px; }
        .perm-checkbox-label input { accent-color: #38bdf8; }

        /* Layout del Módulo de Denuncias */
        .denuncia-layout-container { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; height: calc(100vh - 180px); }
        .denuncia-sidebar { display: flex; flex-direction: column; padding: 15px; background: #050a14; }
        .denuncia-list-scroller { flex: 1; overflow-y: auto; }
        .denuncia-viewer-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: #040813; }
        
        /* Modal del Reporte Formato */
        .mdt-modal-wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(2, 4, 10, 0.85); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .denuncia-window-form { background: #111827; border: 1px solid #1f2937; width: 100%; max-width: 750px; border-radius: 6px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); display: flex; flex-direction: column; gap: 15px; }
        .denuncia-form-header { border-bottom: 2px solid #1e3a8a; padding-bottom: 8px; font-size: 14px; font-weight: 800; color: #38bdf8; letter-spacing: 1.5px; text-transform: uppercase; }
        
        .denuncia-grid-header-fields { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; }
        .denuncia-grid-secondary-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .denuncia-grid-footer-blocks { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .denuncia-box-field { background: #1f2937; border: 1px solid #374151; border-radius: 4px; padding: 10px; display: flex; flex-direction: column; }
        .denuncia-mini-label { font-size: 9px; font-weight: 800; color: #9ca3af; letter-spacing: 0.5px; margin-bottom: 4px; text-transform: uppercase; }
        .denuncia-clean-input { background: transparent; border: none; color: #fff; font-size: 13px; outline: none; width: 100%; }
        .denuncia-static-text { color: #d1d5db; font-size: 13px; font-weight: 600; }
        .denuncia-textarea-clean { background: transparent; border: none; color: #fff; font-size: 13px; outline: none; width: 100%; resize: none; height: 120px; font-family: inherit; }
        
        .footer-block { min-height: 65px; justify-content: space-between; transition: all 0.2s; }
        .footer-block:hover { border-color: #38bdf8; background: #374151; }
        .denuncia-placeholder-inner-text { font-size: 11px; color: #9ca3af; font-weight: 700; text-align: center; margin-top: auto; margin-bottom: auto; }
        
        .denuncia-item-btn { background: #0b1224; border: 1px solid #1e293b; padding: 12px; border-radius: 4px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
        .denuncia-item-btn:hover { border-color: #38bdf8; background: #0f1934; }
        .licencia-tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
        .tag-residente { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .tag-buscado { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    </style>

                .from('solicitudes_fbi')

                <div id="modal-denuncia" class="mdt-modal-wrapper" style="display:none;">
                    <div class="denuncia-window-form">
                        <div class="denuncia-form-header"><span>REDACTAR INFORME DE DENUNCIA</span></div>
                        <div class="denuncia-grid-header-fields">
                            <div class="denuncia-box-field"><label class="denuncia-mini-label">NOMBRE DE LA DENUNCIA</label><input type="text" id="denuncia-titulo" class="denuncia-clean-input" placeholder="Ej: Margarita denuncia Mecanico"></div>
                            <div class="denuncia-box-field"><label class="denuncia-mini-label">REPORT ID</label><div class="denuncia-static-text">#AUTOMÁTICO</div></div>
                            <div class="denuncia-box-field"><label class="denuncia-mini-label">DATE AND HOUR</label><div id="denuncia-fecha-auto" class="denuncia-static-text">-</div></div>
                        </div>
                        <div class="denuncia-grid-secondary-fields">
                            <div class="denuncia-box-field"><label class="denuncia-mini-label">AGENT IN CHARGE</label><div id="denuncia-agente-auto" class="denuncia-static-text" style="color: #38bdf8; font-weight: bold;">-</div></div>
                            <div class="denuncia-box-field"><label class="denuncia-mini-label">LOCATION / IMPLICADO</label><input type="text" id="denuncia-ciudadano" class="denuncia-clean-input" placeholder="Nombre Implicado"></div>
                        </div>
                        <div class="denuncia-box-field"><label class="denuncia-mini-label">📝 REPORT DESCRIPTION</label><textarea id="denuncia-descripcion" class="denuncia-textarea-clean" placeholder="Escriba los hechos principales..."></textarea></div>
                        <div class="denuncia-grid-footer-blocks">
                            <div class="denuncia-box-field footer-block" style="cursor:pointer;" onclick="agregarEvidenciaPrompt()"><label class="denuncia-mini-label">❞ EVIDENCES</label><div id="label-evidencias" class="denuncia-placeholder-inner-text">+ ADD EVIDENCES</div></div>
                            <div class="denuncia-box-field footer-block" style="cursor:pointer;" onclick="agregarPersonaPrompt()"><label class="denuncia-mini-label">🗂 PEOPLE INVOLVED</label><div id="label-personas" class="denuncia-placeholder-inner-text">+ ADD PEOPLE</div></div>
                        </div>
                        <div class="denuncia-grid-footer-blocks">
                            <div class="denuncia-box-field footer-block" onclick="agregarAgentePrompt()" style="cursor:pointer;"><label class="denuncia-mini-label">👮 AGENTES INVOLUCRADOS</label><div id="label-agentes" class="denuncia-placeholder-inner-text">+ AÑADIR AGENTE</div></div>
                            <div class="denuncia-box-field footer-block" onclick="seleccionarEtiquetaPrompt()" style="cursor:pointer;"><label class="denuncia-mini-label">🏷️ ETIQUETAS</label><div id="label-etiqueta" class="denuncia-placeholder-inner-text">Selecciona una etiqueta</div></div>
                        </div>
                        <div style="display:flex; gap:10px; margin-top:10px; justify-content: flex-end;">
                            <button class="btn-submit" style="background:#10b981; width: auto; padding: 10px 25px;" onclick="procesarGuardarDenuncia()">GUARDAR EXPEDIENTE</button>
                            <button class="btn-submit" style="background:#4b5563; width: auto; padding: 10px 25px;" onclick="cerrarModalDenuncia()">CANCELAR</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // FUNCIONES ADMINISTRATIVAS EXCLUSIVAS
        // ==========================================
        window.crearNuevoRangoDinamico = function() {
            const nom = document.getElementById('nuevo-rango-nombre').value.trim();
            if(!nom) return alert("Ingrese el nombre del nuevo rango.");
            const sel = document.getElementById('select-rango-maestro');
            const opt = document.createElement('option');
            opt.value = nom.toLowerCase().replace(/\s+/g, '-');
            opt.innerText = nom;
            sel.appendChild(opt);
            document.getElementById('nuevo-rango-nombre').value = "";
            alert(`Rango '${nom}' creado con éxito en los servidores de seguridad del FBI.`);
        }

        window.cargarPermisosDeRango = function() {
            const val = document.getElementById('select-rango-maestro').value;
            const checkboxes = document.querySelectorAll('.permissions-grid input[type="checkbox"]');
            checkboxes.forEach(c => {
                c.checked = (val === 'director');
                if(val === 'director') c.disabled = true;
                else c.disabled = false;
            });
        }

        window.procesarAscensoAdmin = function() {
            const ag = document.getElementById('asc-agente').value.trim();
            const r1 = document.getElementById('asc-rango-ant').value.trim();
            const r2 = document.getElementById('asc-rango-neu').value.trim();
            const mot = document.getElementById('asc-motivo').value.trim();

            if(!ag || !r2 || !mot) return alert("Por favor, rellene los campos del agente, nuevo rango y el motivo.");

            alert(`[AUDITORÍA FBI]\nPromoción realizada por Supervisor Maestro: ${agenteActual.toUpperCase()}\nAgente: ${ag}\nCambio: ${r1 || 'Agente'} ➡️ ${r2}\nMotivo: ${mot}`);
            document.getElementById('asc-agente').value = "";
            document.getElementById('asc-rango-ant').value = "";
            document.getElementById('asc-rango-neu').value = "";
            document.getElementById('asc-motivo').value = "";
        }

        window.procesarSancionAdmin = function() {
            const ag = document.getElementById('sanc-agente').value.trim();
            const tipo = document.getElementById('sanc-tipo').value;
            const mot = document.getElementById('sanc-motivo').value.trim();
            const ev = document.getElementById('sanc-evidencia').value.trim();

            if(!ag || !mot) return alert("Complete el campo del agente infractor y el motivo.");

            alert(`[SANCIÓN EMITIDA]\nTipo: ${tipo.toUpperCase()}\nAgente: ${ag}\nSupervisor a cargo: ${agenteActual.toUpperCase()}\nEvidencias adjuntas: ${ev || 'Ninguna'}\nMotivo: ${mot}`);
            document.getElementById('sanc-agente').value = "";
            document.getElementById('sanc-motivo').value = "";
            document.getElementById('sanc-evidencia').value = "";
        }

        // CAPTURADORES PROMPTS
        window.agregarEvidenciaPrompt = function() {
            let url = prompt("Introduce la URL de la evidencia:");
            if(url && url.trim() !== "") {
                evidenciasTemporales.push(url.trim());
                document.getElementById('label-evidencias').innerText = `🔗 ${evidenciasTemporales.length} Archivos registrados`;
            }
        }

        window.agregarPersonaPrompt = function() {
            let nombre = prompt("Nombre completo del implicado:");
            if(nombre && nombre.trim() !== "") {
                personasTemporales.push(nombre.trim());
                document.getElementById('label-personas').innerText = `👥 ${personasTemporales.length} Implicados`;
            }
        }

        window.agregarAgentePrompt = function() {
            let agente = prompt("Nombre del agente colaborador:");
            if(agente && agente.trim() !== "") {
                agentesTemporales.push(agente.trim());
                document.getElementById('label-agentes').innerText = `👮 ${agentesTemporales.length} Agentes`;
            }
        }

        window.seleccionarEtiquetaPrompt = function() {
            let etiqueta = prompt("Clasificación del delito:");
            if(etiqueta && etiqueta.trim() !== "") {
                etiquetaSeleccionada = etiqueta.trim();
                document.getElementById('label-etiqueta').innerText = `🏷️ CLASIFICACIÓN: ${etiquetaSeleccionada.toUpperCase()}`;
            }
        }

        window.alternarServicio = function() {
            const btn = document.getElementById('btn-servicio');
            enServicio = !enServicio;
            btn.innerText = enServicio ? "EN SERVICIO" : "FUERA DE SERVICIO";
            btn.className = enServicio ? "btn-duty duty-on" : "btn-duty duty-off";
        }

        window.toggleMenuCerrar = function() {
            const dropdown = document.getElementById('dropdown-logout');
            if(dropdown) dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }

        window.cerrarSesion = function() {
            localStorage.removeItem('fbi_usuario_discord');
            window.location.reload();
        }

        window.cambiarPestaña = async function(pestaña) {
            const vistas = ['panel', 'ciudadanos', 'ficha', 'denuncias', 'admin-rangos', 'admin-personal'];
            vistas.forEach(v => {
                const el = document.getElementById(`vista-${v}`);
                if(el) el.style.display = v === pestaña ? 'block' : 'none';
            });
            
            ['panel', 'ciudadanos', 'denuncias-menu', 'admin-rangos', 'admin-personal'].forEach(id => {
                const el = document.getElementById(`btn-${id}`);
                if(el) el.classList.toggle('active', id.replace('-menu','') === pestaña);
            });

            if(pestaña === 'ciudadanos') await cargarCiudadanos();
            if(pestaña === 'denuncias') await cargarLibroDenuncias();
        }

        async function cargarCiudadanos() {
            const tbody = document.getElementById('tabla-miembros-body');
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#38bdf8;">Sincronizando red...</td></tr>`;
            try {
                const res = await fetch(`https://discord.com/api/guilds/${DISCORD_GUILD_ID}/widget.json`);
                const datos = await res.json();
                let miembros = datos.members || [];
                
                if(miembros.length === 0) {
                    miembros = [{username: "Sebastián García", id: "Sebastian"}, {username: "Ares", id: "Ares"}, {username: "Emanuel", id: "Emanuel"}];
                }

                tbody.innerHTML = "";
                const buscadosGuardados = JSON.parse(localStorage.getItem('fbi_lista_buscados') || "[]");

                miembros.filter(m => !m.bot).forEach(m => {
                    const idUnico = (m.id && m.id !== "0") ? m.id : m.username;
                    const esBuscado = buscadosGuardados.includes(idUnico);
                    const fila = document.createElement('tr');
                    fila.innerHTML = `
                        <td style="color:#38bdf8; font-weight:700;">👤 ${m.username}</td>
                        <td>${esBuscado ? '<span class="licencia-tag tag-buscado">⚠️ BUSCADO</span>' : '<span class="licencia-tag tag-residente">LIMPIO</span>'}</td>
                        <td><button class="btn-buscar" style="background:#1e293b; color:#94a3b8; padding:5px 10px; border:1px solid #334155; border-radius:4px; cursor:pointer;" onclick="verFichaCiudadano('${m.username}', '${idUnico}', ${esBuscado})">EXPEDIENTE</button></td>
                    `;
                    tbody.appendChild(fila);
                });
            } catch (error) { 
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;">Error de conexión.</td></tr>`;
            }
        }

        window.verFichaCiudadano = async function(username, idUnico, esBuscado) {
            ciudadanoSeleccionado = { username, idUnico };
            await cambiarPestaña('ficha');
            document.getElementById('ficha-nombre-ciudadano').innerText = `EXPEDIENTE: ${username.toUpperCase()}`;
            document.getElementById('ficha-id-ciudadano').innerText = idUnico;
            document.getElementById('fbi-trabajo').value = ROLES_CONEXION[username.toLowerCase()] || "Desconocido / Civil";
            actualizarUIBusqueda(esBuscado);
            await cargarNotasCiudadano(idUnico);
        }

        function actualizarUIBusqueda(esBuscado) {
            const el = document.getElementById('ficha-estado-legal');
            const btn = document.getElementById('btn-toggle-busqueda');
            if(esBuscado) {
                el.innerHTML = '<span class="licencia-tag tag-buscado" style="background:#ef4444; color:white; padding:3px 6px; border-radius:4px;">SÍ (REQUERIDO)</span>';
                btn.innerText = "RETIRAR ORDEN DE CAPTURA";
                btn.style.background = "#10b981";
            } else {
                el.innerHTML = '<span class="licencia-tag tag-residente" style="background:#10b981; color:white; padding:3px 6px; border-radius:4px;">NO (LIMPIO)</span>';
                btn.innerText = "EMITIR ORDEN DE BUSCA Y CAPTURA";
                btn.style.background = "#ef4444";
            }
        }

        window.alternarBusquedaFicha = function() {
            let buscados = JSON.parse(localStorage.getItem('fbi_lista_buscados') || "[]");
            const esBuscado = buscados.includes(ciudadanoSeleccionado.idUnico);
            if(esBuscado) {
                buscados = buscados.filter(id => id !== ciudadanoSeleccionado.idUnico);
            } else {
                buscados.push(ciudadanoSeleccionado.idUnico);
            }
            localStorage.setItem('fbi_lista_buscados', JSON.stringify(buscados));
            actualizarUIBusqueda(!esBuscado);
        }

        async function cargarNotasCiudadano(idUnico) {
            const contenedorNotasReal = document.getElementById('contenedor-notas');
            const contenedorMultas = document.getElementById('contenedor-multas-fbi');
            if(contenedorNotasReal) contenedorNotasReal.innerHTML = "";
            if(contenedorMultas) contenedorMultas.innerHTML = "";
            try {
                const { data } = await supabase.from('fbi_notas').select('*').eq('usuario_discord', idUnico).order('creado_en', { ascending: false });
                if(!data || data.length === 0) {
                    if(contenedorNotasReal) contenedorNotasReal.innerHTML = `<p style="color:#4b5563; font-style:italic; font-size:12px;">Sin informes.</p>`;
                    if(contenedorMultas) contenedorMultas.innerHTML = `<p style="color:#4b5563; font-style:italic; font-size:12px;">Sin multas.</p>`;
                    return;
                }
                data.forEach(n => {
                    const div = document.createElement('div');
                    div.style.padding = "8px"; div.style.marginBottom = "5px"; div.style.background = "#06090e";
                    if (n.contenido.startsWith("[MULTA]")) {
                        div.innerHTML = `<p style="color:#fef08a;">${n.contenido}</p>`;
                        if(contenedorMultas) contenedorMultas.appendChild(div);
                    } else {
                        div.innerHTML = `<p style="color:#e2e8f0;">${n.contenido}</p>`;
                        if(contenedorNotasReal) contenedorNotasReal.appendChild(div);
                    }
                });
            } catch (err) {}
        }

        window.guardarNotaFbi = async function(tipo) {
            const input = document.getElementById(tipo === 'nota' ? 'nueva-nota-texto' : 'nueva-multa-texto');
            let texto = input.value.trim();
            if(!texto || !ciudadanoSeleccionado) return;
            const { error } = await supabase.from('fbi_notas').insert([{ usuario_discord: ciudadanoSeleccionado.idUnico, agente: agenteActual, contenido: texto }]);
            if(!error) { input.value = tipo === 'multa' ? '[MULTA] ' : ''; await cargarNotasCiudadano(ciudadanoSeleccionado.idUnico); }
        }

        window.abrirModalNuevaDenuncia = function() { 
            document.getElementById('modal-denuncia').style.display = "flex"; 
            const hoy = new Date();
            document.getElementById('denuncia-fecha-auto').innerText = `${hoy.getDate()}/${hoy.getMonth()+1}/${hoy.getFullYear()}`;
            document.getElementById('denuncia-agente-auto').innerText = `${agenteActual.toUpperCase()}`;
            evidenciasTemporales = []; personasTemporales = []; agentesTemporales = []; etiquetaSeleccionada = "Ninguna";
        }
        
        window.cerrarModalDenuncia = function() {
            document.getElementById('modal-denuncia').style.display = "none";
        }

        window.procesarGuardarDenuncia = async function() {
            const ciudadano = document.getElementById('denuncia-ciudadano').value.trim() || "No assigned location";
            const titulo = document.getElementById('denuncia-titulo').value.trim();
            const descripcionCuerpo = document.getElementById('denuncia-descripcion').value.trim();

            if(!titulo || !descripcionCuerpo) return alert("Complete los campos requeridos.");

            let descripcionFinalPlana = `${descripcionCuerpo}\n\n` +
                `=========================================\n` +
                `🏷️ CLASIFICACIÓN: ${etiquetaSeleccionada.toUpperCase()}\n` +
                `👮 OFICIALES: ${agentesTemporales.join(', ') || 'Ninguno'}\n` +
                `🗂️ IMPLICADOS: ${personasTemporales.join(', ') || 'Ninguno'}\n` +
                `❞ EVIDENCIAS:\n${evidenciasTemporales.map(url => `- ${url}`).join('\n') || '- Sin pruebas.'}`;

            const { error } = await supabase.from('denuncias').insert([{ usuario_ciudadano: ciudadano, agente: agenteActual, titulo: titulo, descripcion: descripcionFinalPlana }]);
            if(!error) { cerrarModalDenuncia(); await cargarLibroDenuncias(); }
        }

        async function cargarLibroDenuncias() {
            const contenedorLista = document.getElementById('lista-denuncias-items');
            contenedorLista.innerHTML = "";
            try {
                const { data } = await supabase.from('denuncias').select('*').order('creado_en', { ascending: false });
                if(!data || data.length === 0) return;
                data.forEach(d => {
                    const btn = document.createElement('div');
                    btn.className = "denuncia-item-btn";
                    btn.innerHTML = `<div style="font-size:12px; font-weight:700; color:#fff;">📁 ${d.titulo.toUpperCase()}</div>`;
                    btn.onclick = () => {
                        document.getElementById('visor-denuncia-contenido').innerHTML = `
                            <h2 style="color:#38bdf8; margin-bottom:10px;">${d.titulo.toUpperCase()}</h2>
                            <pre style="background:#040814; padding:15px; color:#e2e8f0; white-space:pre-wrap; text-align:left;">${d.descripcion}</pre>
                        `;
                    };
                    contenedorLista.appendChild(btn);
                });
            } catch (err) {}
        }
    </script>
